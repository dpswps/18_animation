<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>animation이에요~</title>
    <style>
        * {margin: 0; padding: 0;}
        li {list-style: none;}
        a {text-decoration: none; color: #000;}
        img {vertical-align: top;}


        body{overflow: hidden;}


        /* body {overflow-y: hidden;} */



    @font-face {
    font-family: 'ElegantSerif';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/GraceSerif-Regular.woff2') format('woff2');
    font-weight: 500;
    font-display: swap;
}

@font-face {
    font-family: 'ElegantSerif';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/GraceSerif-Bold.woff2') format('woff2');
    font-weight: 700;
    font-display: swap;
}





        body{font-family: 'ElegantSerif';}

        



        .bg_box .bg1 .img2{width: 100%; height: 100vh; object-fit: cover; position: absolute; left: 0; top: 0; animation:  bgAni 5s forwards;}


        .bg_box .bg1 .img1{/* position: absolute; left: 0; bottom: 0; z-index: 2; animation: looftop 5s forwards; height: 100vh; */position: absolute;
    bottom: 0;
    z-index: 2;
    width: 100%;
    height: auto;
    animation: looftop 5s forwards;}
        .bg_box .bg1 .img0{position: absolute; left: 50%; bottom: 0; animation: man 5s forwards; z-index: 3;}


        @keyframes bgAni{
            0% {height: 200%;}
            100%{height: 100%;}
        }

        @keyframes looftop{
            0% {height: 200%;}
            100%{height: 100%;}
        }

        @keyframes man{
            0% {height: 100%;}
            100%{height: 50%;}
        }
        
        

        header{position: absolute; max-width: 1400px; left: 50%; transform: translateX(-50%); display: flex; justify-content: space-between; width: 100%; align-items: center; z-index: 4}
        header h1{ width: 100px;}
        header h1 img{ width: 100%;}

        header nav{}
        header nav .gnb{display: flex;}
        header nav .gnb li{font-size: 22px; transition: 0.25s; 
            text-shadow: 0 0 10px rgba(0, 0, 0, 1),
            0 0 10px rgba(0, 0, 0, 1),
            0 0 10px rgba(0, 0, 0, 1),
            0 0 10px rgba(0, 0, 0, 1),
            0 0 10px rgba(0, 0, 0, 1),
            0 0 10px rgba(0, 0, 0, 1),
            0 0 10px rgba(0, 0, 0, 1),
            0 0 10px rgba(0, 0, 0, 1),
            0 0 10px rgba(0, 0, 0, 1);}
        header nav .gnb li a{color: #fff; display: block; padding: 10px 30px;}

        header nav .gnb:hover li {transform: scale(0.9); opacity: 0.7;}
        header nav .gnb li:hover{transform: scale(1.1); opacity: 1;}
        header nav .gnb li:hover a {color: skyblue;}

        .textbox{ position: absolute; top: 18%; transform: translateY(-50%); z-index: 5; width: 100%; text-align: center; flex-direction: column;align-items: center; gap: 16px; text-shadow: 0 0 10px rgba(0, 0, 0, 1) ;}
        .textbox ul {display: flex; flex-direction: column; align-items: center;}
        .textbox li{color: #fff; width: auto; display: flex; justify-content: center; opacity: 0.7; }
        .textbox li span{display: block; padding: 5px 0; animation:text 3s forwards; position: relative; opacity: 0;}
        .textbox li span.mb50 {margin-left: 30px; position: relative; opacity: 0;}

        .textbox li:nth-child(1) span{font-size: 150px; }

        .textbox li:nth-child(2) span{font-size: 30px;}


        @keyframes text {
            0% {margin-left: -300px; transform: rotate(20deg) scale(0.1); top: 30px; opacity: 0;}
            

            50% {left: 0; transform: rotate(0) scale(1); top: 0; opacity: 1;}
            80% {left: 50px; opacity: 0.5;}
            100% {left: 50px; opacity: 1;}
        }

        .textbox li:nth-child(1) span:nth-child(2) {animation-delay: 0.1s;}
        .textbox li:nth-child(1) span:nth-child(3) {animation-delay: 0.3s;}
        .textbox li:nth-child(1) span:nth-child(4) {animation-delay: 0.5s;}
        .textbox li:nth-child(1) span:nth-child(5) {animation-delay: 0.7s;}

        .textbox li:nth-child(2) span:nth-child(1) {animation-delay: 1.1s;}
        .textbox li:nth-child(2) span:nth-child(2) {animation-delay: 1.3s;}
        .textbox li:nth-child(2) span:nth-child(3) {animation-delay: 1.5s;}
        .textbox li:nth-child(2) span:nth-child(4) {animation-delay: 1.7s;}
        .textbox li:nth-child(2) span:nth-child(5) {animation-delay: 1.9s;}
        .textbox li:nth-child(2) span:nth-child(6) {animation-delay: 2.1s;}
        .textbox li:nth-child(2) span:nth-child(7) {animation-delay: 2.3s;}
        .textbox li:nth-child(2) span:nth-child(8) {animation-delay: 2.5s;}
        .textbox li:nth-child(2) span:nth-child(9) {animation-delay: 2.7s;}
        .textbox li:nth-child(2) span:nth-child(10) {animation-delay: 2.9s;}
        .textbox li:nth-child(2) span:nth-child(11) {animation-delay: 3.1s;}





        .star_box {}
        .star_box  .star1{position: absolute; background: url(images/star3.png); width: 100%; height: 100vh; left: 0; top: 0; opacity: 0.5; animation: star1 10s infinite linear;}

        @keyframes star1 {
            0% {background-position: 0 0;}
            100% {background-position: -900px 900px;}
        }

        .star_box  .star2{position: absolute; background: url(images/star6.png); width: 100%; height: 100vh; left: 0; top: 0; opacity: 0.5; animation: star2 30s infinite linear; background-size: 50%;}

        @keyframes star2 {
            0% {background-position: 0 0;}
            100% {background-position: -1800px 900px;}
        }

/*         .star_box  .star3{position: absolute; background: url(images/star.png); width: 100%; height: 100vh; left: 0; top: 0; opacity: 0.5; animation: star1 5s infinite linear;}

        @keyframes star3 {
            0% {background-position: 0 0;}
            100% {background-position: 1000px 900px;}
        } */
    </style>
</head>
<body>
    <div class="wrap">

        <!-- 헤더영역 -->
        <header>
            <h1><img src="images/logo.png" alt="로고"></h1>
            <nav>
                <ul class="gnb">
                    <li><a href="#">01 HOME</a></li>
                    <li><a href="#">02 ABOUT</a></li>
                    <li><a href="#">03 WORKS</a></li>
                    <li><a href="#">04 ARCHIVE</a></li>
                    <li><a href="#">05 CONTACT</a></li>
                </ul>
            </nav>
            <audio src="audio/music.mp4" controls></audio>
        </header>

        <div class="textbox">
            <ul>
                <li>
                    <span class="mb50">너</span>
                    <span class="mb50">의</span>
                    <span class="mb50">이</span>
                    <span class="mb50">름</span>
                    <span class="mb50">은</span>
                </li>    
                <li>                  
                    <span>혜</span>
                    <span>성</span>
                    <span>이</span>
                    <span class="mb50">떨</span>
                    <span>어</span>
                    <span>지</span>
                    <span>는</span>
                    <span class="mb50">밤</span>
                    <span>의</span>
                    <span class="mb50">옥</span>
                    <span>상</span>
                </li>
            </ul>
        </div>



        <div class="bg_box">
            <div class="bg1">
                <img src="images/bg.png" alt="" class=img2>
                <img src="images/looftop.png" alt="" class=img1>
                <img src="images/man.png" alt="" class=img0>
            </div>
        </div>

        <div class="star_box">
            <div class="star1"></div>
            <div class="star2"></div>
            <div class="star3"></div>
        </div>
    </div>

</body>
</html>
